name: gpfa
objective: negative_log_marginal_likelihood
latent_dim: 3
bin_width: 20.0
start_tau: 100.0
start_eps: 1.0e-3
min_var_frac: 0.01
learn_kernel_params: true
fa_max_iters: 500
fa_tol: 1.0e-8
kernel_param_max_iters: 8
kernel_param_lr: 1.0
jitter: 1.0e-5
optimization:
  name: gradient
  optimizer: Adam
  lr: 1.0e-2
  weight_decay: 0.0
  gradient_clip: 100.0
