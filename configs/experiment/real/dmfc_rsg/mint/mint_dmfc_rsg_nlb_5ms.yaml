dataset:
  name: dmfc_rsg
  split: test
  bin_size_ms: 5
  data_path: data/real/nlb/dmfc_rsg_test_5ms.h5
  max_trials: null

model:
  name: mint
  objective: mint_likelihood_recursion
  dataset: dmfc_rsg
  train_source: nwb
  train_split: trainval
  nlb_neural_state_defaults: true
  nwb_root: data/real/nlb/dandi
  mat_data_root: data/mint
  target_h5: data/real/nlb/eval_data_test.h5
  eval_bin_size_ms: 5
  n_candidates: 2
  window_length: 1500
  delta: 20
  sigma: 55
  min_rate: 0.1
  causal: false
  optimization:
    name: inference_only

preprocessing:
  observations: null

trainer:
  epochs: 0
  batch_size: 1
  device: cpu

experiment:
  output_dir: runs
  run_name: mint_dmfc_rsg_nlb_5ms_paper_dmfc
  save_predictions: true
