dataset:
  name: mc_maze
  data_path: data/real/nlb/mc_maze_test_5ms.h5
  split: test
  bin_size_ms: 5
  max_trials: null

model:
  name: smoothing
  objective: smoothed_poisson_nll
  kern_sd_ms: 50.0
  bin_size_ms: 5.0
  log_offset: 1.0e-4
  nlb_decoder_alpha: 0.01
  nlb_poisson_max_iter: 500
  prediction_floor: 1.0e-9
  optimization:
    name: inference_only

preprocessing:
  observations: null

trainer:
  epochs: 0
  batch_size: 4096
  device: cpu

experiment:
  output_dir: runs
  run_name: smoothing_mc_maze_nlb_5ms
  save_predictions: true
