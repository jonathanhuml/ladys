dataset:
  name: mc_maze
  data_path: data/real/nlb/mc_maze_test_5ms.h5
  split: test
  bin_size_ms: 5
  max_trials: null

model:
  name: slds
  objective: slds_variational_em
  states: 6
  latent_dim: 38
  transition_stickiness: 0.95
  dynamics_l2_A: 30000.0
  dynamics_l2_b: 6.264734351046042e-05
  dynamics_var_floor: 1.0e-4
  emission_l2: 0.0
  emission_lr: 1.0
  emission_mstep_steps: 100
  emission_batch_size: 8192
  emission_max_points: 200000
  em_alpha: 0.2
  local_inference_iters: 1
  continuous_steps: 100
  continuous_lr: 1.0
  continuous_tolerance: 1.0e-4
  latent_l2: 0.0
  latent_clip: null
  init_seed: 0
  init_max_points: 50000
  init_em_iters: 50
  prediction_floor: 1.0e-9
  optimization:
    name: em

preprocessing:
  observations: null

trainer:
  epochs: 50
  batch_size: 8
  device: cpu

experiment:
  output_dir: runs
  run_name: slds_mc_maze_nlb_5ms
  save_predictions: true
