dataset:
  name: lorenz
  neurons: 32
  num_inits: 4
  num_trials: 8
  num_steps: 100
  burn_steps: 1000
  train_fraction: 0.8
  seed: 0
  latent_dt: 0.015
  spike_bin_size: 1.0
  base_rate: 1.0

model:
  name: psth
  objective: psth_poisson_nll
  kern_sd_ms: 3.0
  bin_size_ms: 1.0
  prediction_floor: 1.0e-9
  optimization:
    name: inference_only

preprocessing:
  observations: null

trainer:
  epochs: 0
  batch_size: 32
  device: cpu

experiment:
  output_dir: runs
  run_name: psth_lorenz
  save_predictions: true
