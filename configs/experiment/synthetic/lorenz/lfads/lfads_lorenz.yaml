dataset:
  name: lorenz
  neurons: 32
  num_inits: 4
  num_trials: 8
  num_steps: 100
  burn_steps: 1000
  train_fraction: 0.8
  seed: 0
  latent_dt: 0.015
  spike_bin_size: 1.0
  base_rate: 1.0

model:
  name: lfads
  objective: lfads_elbo
  generator_dim: 64
  inferred_input_dim: 2
  factor_dim: 20
  g0_encoder_dim: 64
  controller_encoder_dim: 64
  controller_dim: 64
  g0_prior_kappa: 0.1
  inferred_input_prior_kappa: 0.1
  keep_prob: 0.95
  clip_val: 5.0
  dt: 1.0
  log_rate_min: -8.0
  log_rate_max: 8.0
  posterior_logvar_min: -9.210340371976182
  posterior_logvar_max: 5.0
  use_log1p_encoder_inputs: true
  initialize_log_rate_bias: true
  prediction_samples: 1
  kl_weight_schedule_start: 0
  kl_weight_schedule_dur: 2000
  l2_weight_schedule_start: 0
  l2_weight_schedule_dur: 2000
  l2_gen_scale: 0.0
  l2_con_scale: 0.0
  optimization:
    name: gradient
    optimizer: Adam
    lr: 1.0e-3
    weight_decay: 0.0
    gradient_clip: 200.0

preprocessing:
  observations: null

trainer:
  epochs: 200
  batch_size: 4
  device: cpu
